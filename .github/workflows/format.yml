on:
  push:
    branches:
      - '*'

name: "Format Code"
permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check
